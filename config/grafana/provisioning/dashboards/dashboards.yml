apiVersion: 1

providers:
  - name: Observability Demo Student
    orgId: 1
    folder: Observability Demo - Student
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/student

  - name: Observability Demo Reference
    orgId: 1
    folder: Observability Demo - Reference
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/reference
