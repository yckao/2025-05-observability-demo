events {}

http {
  log_format clf '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent';
  access_log /dev/stdout clf;
  error_log /dev/stderr warn;
  resolver 127.0.0.11 valid=5s ipv6=off;

  split_clients "${remote_addr}${remote_port}${msec}" $frontend_target {
    33% frontend-1:8080;
    33% frontend-2:8080;
    * frontend-3:8080;
  }

  split_clients "${remote_addr}${remote_port}${msec}" $backend_target {
    33% backend-1:8080;
    33% backend-2:8080;
    * backend-3:8080;
  }

  map $request_uri $fault_target {
    default backend-1:8080;
  }

  server {
    listen 80;

    location /api/fault/ {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_pass http://$fault_target;
    }

    location /api/ {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_pass http://$backend_target;
    }

    location / {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_pass http://$frontend_target;
    }
  }
}
