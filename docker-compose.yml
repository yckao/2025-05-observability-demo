x-json-logging: &json-logging
  driver: json-file
  options:
    labels: com.observability.service,com.observability.replica,com.observability.log_format

services:
  load-balancer:
    image: nginx:1.27-alpine
    restart: on-failure
    container_name: obs-demo-load-balancer
    cgroup_parent: obs-demo-load-balancer.slice
    ports:
      - "8080:80"
      - "8088:8088"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend-1
      - frontend-2
      - frontend-3
      - backend-1
      - backend-2
      - backend-3
    labels:
      com.observability.service: load-balancer
      com.observability.replica: load-balancer
      com.observability.log_format: clf
    logging: *json-logging

  frontend-1: &frontend
    build: ./apps/frontend
    restart: on-failure
    container_name: obs-demo-frontend-1
    cgroup_parent: obs-demo-frontend-1.slice
    cpus: "0.50"
    mem_limit: 256m
    expose:
      - "8080"
    environment:
      SERVICE_NAME: frontend
      REPLICA_ID: frontend-1
      BACKEND_URL: http://load-balancer/api
      PUBLIC_GRAFANA_URL: ${PUBLIC_GRAFANA_URL:-http://localhost:3000}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4317
      PYROSCOPE_SERVER_ADDRESS: http://pyroscope:4040
    labels:
      com.observability.service: frontend
      com.observability.replica: frontend-1
      com.observability.log_format: logfmt
    logging: *json-logging

  frontend-2:
    <<: *frontend
    container_name: obs-demo-frontend-2
    cgroup_parent: obs-demo-frontend-2.slice
    environment:
      SERVICE_NAME: frontend
      REPLICA_ID: frontend-2
      BACKEND_URL: http://load-balancer/api
      PUBLIC_GRAFANA_URL: ${PUBLIC_GRAFANA_URL:-http://localhost:3000}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4317
      PYROSCOPE_SERVER_ADDRESS: http://pyroscope:4040
    labels:
      com.observability.service: frontend
      com.observability.replica: frontend-2
      com.observability.log_format: logfmt
    logging: *json-logging

  frontend-3:
    <<: *frontend
    container_name: obs-demo-frontend-3
    cgroup_parent: obs-demo-frontend-3.slice
    environment:
      SERVICE_NAME: frontend
      REPLICA_ID: frontend-3
      BACKEND_URL: http://load-balancer/api
      PUBLIC_GRAFANA_URL: ${PUBLIC_GRAFANA_URL:-http://localhost:3000}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4317
      PYROSCOPE_SERVER_ADDRESS: http://pyroscope:4040
    labels:
      com.observability.service: frontend
      com.observability.replica: frontend-3
      com.observability.log_format: logfmt
    logging: *json-logging

  backend-1: &backend
    build: ./apps/backend
    restart: on-failure
    container_name: obs-demo-backend-1
    cgroup_parent: obs-demo-backend-1.slice
    cpus: "0.50"
    mem_limit: 512m
    expose:
      - "8080"
    environment:
      SERVICE_NAME: backend
      REPLICA_ID: backend-1
      DATABASE_DSN: host=crdb-1,crdb-2,crdb-3 port=26257,26257,26257 dbname=observability_demo user=root sslmode=disable connect_timeout=3
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4317
      PYROSCOPE_SERVER_ADDRESS: http://pyroscope:4040
    depends_on:
      - crdb-1
      - crdb-2
      - crdb-3
    labels:
      com.observability.service: backend
      com.observability.replica: backend-1
      com.observability.log_format: mixed
    logging: *json-logging

  backend-2:
    <<: *backend
    container_name: obs-demo-backend-2
    cgroup_parent: obs-demo-backend-2.slice
    environment:
      SERVICE_NAME: backend
      REPLICA_ID: backend-2
      DATABASE_DSN: host=crdb-1,crdb-2,crdb-3 port=26257,26257,26257 dbname=observability_demo user=root sslmode=disable connect_timeout=3
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4317
      PYROSCOPE_SERVER_ADDRESS: http://pyroscope:4040
    labels:
      com.observability.service: backend
      com.observability.replica: backend-2
      com.observability.log_format: mixed
    logging: *json-logging

  backend-3:
    <<: *backend
    container_name: obs-demo-backend-3
    cgroup_parent: obs-demo-backend-3.slice
    environment:
      SERVICE_NAME: backend
      REPLICA_ID: backend-3
      DATABASE_DSN: host=crdb-1,crdb-2,crdb-3 port=26257,26257,26257 dbname=observability_demo user=root sslmode=disable connect_timeout=3
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4317
      PYROSCOPE_SERVER_ADDRESS: http://pyroscope:4040
    labels:
      com.observability.service: backend
      com.observability.replica: backend-3
      com.observability.log_format: mixed
    logging: *json-logging

  crdb-1:
    image: cockroachdb/cockroach:v24.2.4
    restart: on-failure
    container_name: obs-demo-crdb-1
    cgroup_parent: obs-demo-crdb-1.slice
    cpus: "1.00"
    mem_limit: 1g
    command: start --insecure --join=crdb-1,crdb-2,crdb-3 --advertise-addr=crdb-1 --listen-addr=0.0.0.0:26257 --http-addr=0.0.0.0:8080 --cache=128MiB --max-sql-memory=128MiB
    volumes:
      - crdb-1:/cockroach/cockroach-data
    labels:
      com.observability.service: database
      com.observability.replica: crdb-1
      com.observability.log_format: text
    logging: *json-logging

  crdb-2:
    image: cockroachdb/cockroach:v24.2.4
    restart: on-failure
    container_name: obs-demo-crdb-2
    cgroup_parent: obs-demo-crdb-2.slice
    cpus: "1.00"
    mem_limit: 1g
    command: start --insecure --join=crdb-1,crdb-2,crdb-3 --advertise-addr=crdb-2 --listen-addr=0.0.0.0:26257 --http-addr=0.0.0.0:8080 --cache=128MiB --max-sql-memory=128MiB
    volumes:
      - crdb-2:/cockroach/cockroach-data
    labels:
      com.observability.service: database
      com.observability.replica: crdb-2
      com.observability.log_format: text
    logging: *json-logging

  crdb-3:
    image: cockroachdb/cockroach:v24.2.4
    restart: on-failure
    container_name: obs-demo-crdb-3
    cgroup_parent: obs-demo-crdb-3.slice
    cpus: "1.00"
    mem_limit: 1g
    command: start --insecure --join=crdb-1,crdb-2,crdb-3 --advertise-addr=crdb-3 --listen-addr=0.0.0.0:26257 --http-addr=0.0.0.0:8080 --cache=128MiB --max-sql-memory=128MiB
    volumes:
      - crdb-3:/cockroach/cockroach-data
    labels:
      com.observability.service: database
      com.observability.replica: crdb-3
      com.observability.log_format: text
    logging: *json-logging

  db-init:
    image: cockroachdb/cockroach:v24.2.4
    restart: on-failure
    depends_on:
      - crdb-1
      - crdb-2
      - crdb-3
    volumes:
      - ./db/schema.sql:/schema.sql:ro
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "sleep 5;
      /cockroach/cockroach init --insecure --host=crdb-1:26257 || true;
      until /cockroach/cockroach sql --insecure --host=crdb-1:26257 -e 'SELECT 1'; do sleep 2; done;
      /cockroach/cockroach sql --insecure --host=crdb-1:26257 -f /schema.sql"
    labels:
      com.observability.service: db-init
      com.observability.replica: db-init
      com.observability.log_format: text
    logging: *json-logging

  alloy:
    image: grafana/alloy:v1.5.1
    restart: on-failure
    user: "0:0"
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./config/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - ${DOCKER_ROOT_DIR:-/var/lib/docker}/containers:/var/lib/docker/containers:ro
      - alloy-data:/var/lib/alloy/data
    depends_on:
      - prometheus
      - loki
      - tempo
      - pyroscope
    labels:
      com.observability.service: alloy
      com.observability.replica: alloy
      com.observability.log_format: text
    logging: *json-logging

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: on-failure
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver
      - --web.enable-lifecycle
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    labels:
      com.observability.service: prometheus
      com.observability.replica: prometheus
      com.observability.log_format: text
    logging: *json-logging

  loki:
    image: grafana/loki:3.2.1
    restart: on-failure
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./config/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    labels:
      com.observability.service: loki
      com.observability.replica: loki
      com.observability.log_format: text
    logging: *json-logging

  tempo:
    image: grafana/tempo:2.6.1
    restart: on-failure
    command: -config.file=/etc/tempo/tempo.yml
    volumes:
      - ./config/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    labels:
      com.observability.service: tempo
      com.observability.replica: tempo
      com.observability.log_format: text
    logging: *json-logging

  pyroscope:
    image: grafana/pyroscope:1.9.0
    restart: on-failure
    user: "0:0"
    command: -config.file=/etc/pyroscope/pyroscope.yml
    volumes:
      - ./config/pyroscope/pyroscope.yml:/etc/pyroscope/pyroscope.yml:ro
      - pyroscope-data:/var/lib/pyroscope
    labels:
      com.observability.service: pyroscope
      com.observability.replica: pyroscope
      com.observability.log_format: text
    logging: *json-logging

  grafana:
    image: grafana/grafana:11.3.1
    restart: on-failure
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
      GF_SERVER_ROOT_URL: ${PUBLIC_GRAFANA_URL:-http://localhost:3000}
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor correlations traceToProfiles
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - tempo
      - pyroscope
    labels:
      com.observability.service: grafana
      com.observability.replica: grafana
      com.observability.log_format: text
    logging: *json-logging

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: on-failure
    user: "0:0"
    command:
      - --store_container_labels=true
      - --whitelisted_container_labels=com.observability.service,com.observability.replica,com.docker.compose.service
      - --housekeeping_interval=10s
    privileged: true
    expose:
      - "8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - ${DOCKER_ROOT_DIR:-/var/lib/docker}/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    labels:
      com.observability.service: cadvisor
      com.observability.replica: cadvisor
      com.observability.log_format: text
    logging: *json-logging

  k6:
    image: grafana/k6:0.54.0
    restart: on-failure
    profiles:
      - tools
    volumes:
      - ./load:/scripts:ro
    labels:
      com.observability.service: k6
      com.observability.replica: k6
      com.observability.log_format: text
    logging: *json-logging

  traffic-generator:
    image: grafana/k6:0.54.0
    profiles:
      - traffic
    restart: on-failure
    command: run /scripts/k6-consistent.js
    environment:
      BASE_URL: http://load-balancer
      TRAFFIC_DURATION: ${TRAFFIC_DURATION:-30m}
      HOME_PER_MIN: ${HOME_PER_MIN:-20}
      SHOP_PER_MIN: ${SHOP_PER_MIN:-30}
      PRODUCTS_PER_MIN: ${PRODUCTS_PER_MIN:-20}
      CHECKOUT_PER_MIN: ${CHECKOUT_PER_MIN:-10}
      ORDERS_PER_MIN: ${ORDERS_PER_MIN:-10}
      HEALTH_PER_MIN: ${HEALTH_PER_MIN:-6}
      PREALLOCATED_VUS: ${PREALLOCATED_VUS:-}
      MAX_VUS: ${MAX_VUS:-50}
    volumes:
      - ./load:/scripts:ro
    depends_on:
      - load-balancer
    labels:
      com.observability.service: traffic-generator
      com.observability.replica: traffic-generator
      com.observability.log_format: text
    logging: *json-logging

volumes:
  alloy-data:
  prometheus-data:
  loki-data:
  tempo-data:
  pyroscope-data:
  grafana-data:
  crdb-1:
  crdb-2:
  crdb-3:
